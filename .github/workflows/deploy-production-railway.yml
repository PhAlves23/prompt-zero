name: Deploy Production (Railway)

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  backend-validate:
    name: Backend Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: promptzero
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d promptzero"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/promptzero
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_SECRET: dev-encryption-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        run: yarn --frozen-lockfile
        working-directory: backend

      - name: Generate Prisma Client
        run: yarn prisma:generate
        working-directory: backend

      - name: Apply migrations
        run: yarn prisma:migrate:deploy
        working-directory: backend

      - name: Lint
        run: yarn lint
        working-directory: backend

      - name: Unit tests
        run: yarn test
        working-directory: backend

      - name: E2E tests
        run: yarn test:e2e
        working-directory: backend

      - name: Build
        run: yarn build
        working-directory: backend

  frontend-validate:
    name: Frontend Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: promptzero
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d promptzero"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/promptzero
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/promptzero
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_SECRET: dev-encryption-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Node (Yarn cache — backend E2E)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Validate pnpm availability
        run: pnpm --version

      - name: Install backend dependencies (Playwright stack)
        run: yarn --frozen-lockfile
        working-directory: backend

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: frontend

      - name: Lint
        run: pnpm lint
        working-directory: frontend

      - name: Unit tests (Vitest)
        run: pnpm test
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend

      - name: Install Playwright browser
        run: pnpm test:e2e:install
        working-directory: frontend

      - name: Frontend E2E tests (Playwright)
        run: pnpm test:e2e
        working-directory: frontend

  backend-migrate-and-deploy:
    name: Backend Migrate + Deploy Railway
    runs-on: ubuntu-latest
    needs: [backend-validate]
    environment: fantastic-bravery / production
    env:
      # O CLI resolve projeto/ambiente via env (get_linked_project); `railway status` não aceita --project.
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      DATABASE_URL: ${{ secrets.RAILWAY_BACKEND_DATABASE_URL_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      # Prepare API token from secrets (try RAILWAY_API_TOKEN first, fallback to RAILWAY_TOKEN).
      # Railway CLI expects RAILWAY_TOKEN env var for authentication.
      - name: Prepare Railway API token
        run: |
          raw='${{ secrets.RAILWAY_API_TOKEN }}'
          if [ -z "$raw" ]; then raw='${{ secrets.RAILWAY_TOKEN }}'; fi
          if [ -z "$raw" ]; then echo "Defina o secret RAILWAY_API_TOKEN (ou RAILWAY_TOKEN) com Account ou Workspace token." && exit 1; fi
          clean=$(printf '%s' "$raw" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          {
            echo "RAILWAY_API_TOKEN<<__RWT__"
            echo "$clean"
            echo "__RWT__"
          } >> "$GITHUB_ENV"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.36.0

      - name: Validate required deploy secrets
        run: |
          [ -n "${RAILWAY_API_TOKEN}" ] || (echo "Token Railway não propagado (passo Prepare)." && exit 1)
          [ -n "${DATABASE_URL}" ] || (echo "Missing secret: RAILWAY_BACKEND_DATABASE_URL_PROD" && exit 1)

      # `railway status` / whoami exigem escopo de conta ou queries que tokens de workspace rejeitam.
      # Validação real: `railway up` abaixo.

      - name: Install backend dependencies
        run: yarn --frozen-lockfile
        working-directory: backend

      - name: Run production migrations
        run: yarn prisma:migrate:deploy
        working-directory: backend

      - name: Deploy backend service
        run: railway up --ci --service "${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" --project "${{ secrets.RAILWAY_PROJECT_ID }}"
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_API_TOKEN }}

  frontend-deploy:
    name: Frontend Deploy Railway
    runs-on: ubuntu-latest
    needs: [frontend-validate]
    environment: fantastic-bravery / production
    env:
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate pnpm availability
        run: pnpm --version

      - name: Prepare Railway API token
        run: |
          raw='${{ secrets.RAILWAY_API_TOKEN }}'
          if [ -z "$raw" ]; then raw='${{ secrets.RAILWAY_TOKEN }}'; fi
          if [ -z "$raw" ]; then echo "Defina RAILWAY_API_TOKEN (ou RAILWAY_TOKEN)." && exit 1; fi
          clean=$(printf '%s' "$raw" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          {
            echo "RAILWAY_API_TOKEN<<__RWT__"
            echo "$clean"
            echo "__RWT__"
          } >> "$GITHUB_ENV"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.36.0

      - name: Check Railway token present
        run: |
          [ -n "${RAILWAY_API_TOKEN}" ] || (echo "Token Railway não propagado." && exit 1)

      - name: Deploy frontend service
        run: railway up --ci --service "${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" --project "${{ secrets.RAILWAY_PROJECT_ID }}"
        working-directory: frontend
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_API_TOKEN }}
