services:
  postgres:
    image: postgres:16-alpine
    container_name: promptzero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promptzero
    ports:
      - "5434:5432"
    volumes:
      - promptzero_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptzero"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  promptzero_postgres_data:
