<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      @font-face {
        font-family: 'Space Mono';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/spacemono/v17/i7dMIFZifjKcF5UAWdDRaPpZUFWaHg.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      .mark-bg { fill: #BEFF00; }
      .mark-fg { fill: #0A0A0B; }
      .wordmark { fill: #0A0A0B; }
    ]]></style>
  </defs>
  <!-- Mark: same proportions as favicon, scaled -->
  <g transform="translate(0, 4)">
    <rect class="mark-bg" width="32" height="32" rx="6"/>
    <text class="mark-fg" x="16" y="16" dy="-0.04em" font-family="'Space Mono', monospace" font-size="24" font-weight="700" text-anchor="middle" dominant-baseline="central">0</text>
  </g>
  <!-- Wordmark -->
  <text
    class="wordmark"
    x="42"
    y="20"
    dy="0.35em"
    font-family="'Space Mono', monospace"
    font-size="17"
    font-weight="700"
    letter-spacing="-0.02em"
  >PromptZero</text>
</svg>
