apiVersion: 1

providers:
  - name: 'PromptZero Dashboards'
    orgId: 1
    folder: 'PromptZero'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Ver comentário no dockerfile: volume em /var/lib/grafana esconde paths copiados na build.
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: true
