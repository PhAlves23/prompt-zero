apiVersion: 1

# Mark provisioned data sources for deletion if they are no longer in a provisioning file.
prune: false

# List of data sources to insert/update depending on what's available.
datasources:
  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: grafana_loki
    url: $LOKI_INTERNAL_URL
    isDefault: true
    editable: true
    jsonData:
      timeout: 60
      maxLines: 1000
    
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: grafana_prometheus
    url: $PROMETHEUS_INTERNAL_URL
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 30s
      queryTimeout: 60s
    
  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: grafana_tempo
    url: $TEMPO_INTERNAL_URL
    isDefault: false
    editable: true
    jsonData:
      timeout: 60
