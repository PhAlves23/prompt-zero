apiVersion: 1

prune: false

datasources:
  - name: Loki
    type: loki
    access: direct
    orgId: 1
    uid: grafana_loki
    url: http://loki.railway.internal:3100
    isDefault: true
    
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: grafana_prometheus
    url: http://prometheus.railway.internal:9090
    isDefault: false
    
  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: grafana_tempo
    url: http://tempo.railway.internal:3200
    isDefault: false
