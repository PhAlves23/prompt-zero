global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'promptzero-production'
    environment: 'railway'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PromptZero Backend (Railway)
  - job_name: 'promptzero-backend'
    static_configs:
      - targets: ['back-end.railway.internal:3001']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend-production'
      - source_labels: [__address__]
        target_label: service
        replacement: 'promptzero-backend'

  # PromptZero Frontend (Railway) — só útil se o Next expuser métricas Prometheus neste path
  - job_name: 'promptzero-frontend'
    static_configs:
      - targets: ['front-end.railway.internal:3000']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'frontend-production'
      - source_labels: [__address__]
        target_label: service
        replacement: 'promptzero-frontend'
