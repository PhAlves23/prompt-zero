global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'promptzero-local'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend NestJS application
  - job_name: 'promptzero-backend'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/api/v1/metrics'
    scheme: http

  # OpenTelemetry Collector
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888', 'otel-collector:8889']

  # Node Exporter (optional, for system metrics)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

# Remote write configuration (for sending metrics to other systems)
# remote_write:
#   - url: 'http://remote-prometheus:9090/api/v1/write'
